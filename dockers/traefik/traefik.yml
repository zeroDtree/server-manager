# Static Traefik config for GSAD production (HTTPS + Let's Encrypt).
# ACME email is injected via compose command: --certificatesresolvers.letsencrypt.acme.email

api:
  dashboard: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

certificatesResolvers:
  letsencrypt:
    acme:
      storage: /acme/acme.json
      httpChallenge:
        entryPoint: web

providers:
  docker:
    exposedByDefault: false
    network: gsad_traefik
