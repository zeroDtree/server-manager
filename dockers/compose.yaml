x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16
    logging: *default-logging
    environment:
      POSTGRES_DB: gsad
      POSTGRES_USER: gsad
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gsad"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    logging: *default-logging
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  backend:
    logging: *default-logging
    build:
      context: ..
      dockerfile: dockers/backend/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_HOST: postgres
      DB_USER: gsad
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      AGENT_PSK: ${AGENT_PSK}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  frontend:
    profiles: ["prod"]
    logging: *default-logging
    build:
      context: ..
      dockerfile: dockers/frontend/Dockerfile
    depends_on:
      backend:
        condition: service_healthy

  account-provision-mock:
    profiles: ["mock"]
    logging: *default-logging
    build:
      context: mocks/account-provision
    environment:
      UPSTREAM_API_URL: http://backend:8080
      AGENT_PSK: ${AGENT_PSK}
      PROVISION_POLL_INTERVAL: 10
      MOCK_SERVER_COUNT: 100
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

  gpu-server-report-mock:
    profiles: ["mock"]
    logging: *default-logging
    build:
      context: mocks/gpu-server-report
    environment:
      REPORT_API_URL: http://backend:8080
      AGENT_PSK: ${AGENT_PSK}
      AGENT_REPORT_INTERVAL: 30
      MOCK_SERVER_COUNT: 100
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
